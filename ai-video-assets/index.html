<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI视频资产管理</title>
<link rel="icon" href="assets/app-logo.svg" type="image/svg+xml">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg:#eef2f7;
  --panel:rgba(255,255,255,.68);
  --panel-strong:rgba(255,255,255,.86);
  --line:rgba(83,93,124,.16);
  --line-strong:rgba(83,93,124,.28);
  --text:#111827;
  --muted:#5f687d;
  --quiet:#8d96a8;
  --accent:#4f46e5;
  --accent-soft:rgba(79,70,229,.12);
  --accent-line:rgba(79,70,229,.35);
  --cyan:#0891b2;
  --green:#059669;
  --amber:#d97706;
  --blue:#2563eb;
  --red:#dc2626;
  --shadow-sm:0 10px 28px rgba(17,24,39,.07);
  --shadow:0 22px 60px rgba(17,24,39,.12);
  --radius:16px;
  --radius-sm:10px;
  --blur:blur(22px) saturate(1.32);
  --font:"Noto Sans SC","PingFang SC","Microsoft YaHei",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
*{margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  min-height:100vh;
  font-family:var(--font);
  color:var(--text);
  background:
    radial-gradient(circle at 12% 10%,rgba(79,70,229,.18),transparent 28%),
    radial-gradient(circle at 88% 16%,rgba(8,145,178,.14),transparent 26%),
    linear-gradient(135deg,#f8fafc 0%,#edf2f7 48%,#f5f7fb 100%);
  background-attachment:fixed;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(17,24,39,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(17,24,39,.035) 1px,transparent 1px);
  background-size:44px 44px;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,.55),transparent 78%);
}
button,input,select,textarea{font:inherit}
button{border:none}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:3px solid rgba(79,70,229,.24);outline-offset:2px}

.tb{
  position:sticky;
  top:0;
  z-index:100;
  height:68px;
  padding:0 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  border-bottom:1px solid var(--line);
  background:rgba(248,250,252,.72);
  backdrop-filter:var(--blur);
}
.tb-brand{display:flex;align-items:center;gap:12px;min-width:0}
.tb-mark{
  width:42px;
  height:42px;
  border-radius:13px;
  overflow:hidden;
  background:#fff;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.7),0 8px 20px rgba(79,70,229,.18);
  flex:0 0 auto;
}
.tb-mark img{width:100%;height:100%;object-fit:cover;display:block}
.tb-title{display:flex;flex-direction:column;gap:1px;min-width:0}
.tb-title strong{font-size:15px;font-weight:760;white-space:nowrap}
.tb-title span{font-size:11px;color:var(--muted);white-space:nowrap}
.tb-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}
.status-pill{
  display:none;
  align-items:center;
  gap:7px;
  min-height:32px;
  padding:0 12px;
  border:1px solid rgba(5,150,105,.18);
  border-radius:999px;
  background:rgba(5,150,105,.08);
  color:#047857;
  font-size:12px;
  font-weight:680;
}
.status-pill::before{content:"";width:7px;height:7px;border-radius:50%;background:#10b981;box-shadow:0 0 0 4px rgba(16,185,129,.12)}

.shell{max-width:1280px;margin:0 auto;padding:28px 24px 52px}
.hero{
  display:grid;
  grid-template-columns:minmax(0,1fr) 330px;
  gap:22px;
  align-items:stretch;
  margin-bottom:22px;
}
.hero-main,.hero-side,.panel{
  border:1px solid var(--line);
  background:var(--panel);
  backdrop-filter:var(--blur);
  box-shadow:var(--shadow-sm);
}
.hero-main{position:relative;overflow:hidden;border-radius:22px;padding:34px 34px 28px;min-height:218px}
.hero-main::after{
  content:"";
  position:absolute;
  width:260px;
  height:260px;
  right:-82px;
  top:-90px;
  border-radius:999px;
  background:radial-gradient(circle,rgba(79,70,229,.22),transparent 68%);
}
.kicker{display:inline-flex;align-items:center;gap:8px;padding:5px 10px;border-radius:999px;background:rgba(17,24,39,.05);color:var(--muted);font-size:12px;font-weight:720;margin-bottom:14px}
.kicker i{width:7px;height:7px;border-radius:99px;background:var(--cyan);box-shadow:0 0 0 4px rgba(8,145,178,.12)}
.hero h1{position:relative;z-index:1;font-size:clamp(30px,4.3vw,58px);line-height:1.04;letter-spacing:0;font-weight:820;max-width:720px;text-wrap:pretty}
.hero h1 span{color:var(--accent)}
.hero p{position:relative;z-index:1;margin-top:14px;max-width:650px;color:var(--muted);font-size:15px}
.hero-side{border-radius:22px;padding:22px;display:flex;flex-direction:column;justify-content:space-between;gap:16px}
.logo-card{display:flex;align-items:center;gap:14px}
.logo-card img{width:64px;height:64px;border-radius:18px;box-shadow:0 12px 26px rgba(79,70,229,.22)}
.logo-card strong{font-size:17px;line-height:1.25}
.logo-card span{display:block;margin-top:4px;font-size:12px;color:var(--muted)}
.quick-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.qm{padding:12px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.46)}
.qm b{display:block;font-size:22px;line-height:1.1}.qm span{font-size:12px;color:var(--quiet)}

.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:28px 2px 12px}
.section-title{display:flex;align-items:center;gap:10px}
.section-icon{width:34px;height:34px;border-radius:12px;background:rgba(17,24,39,.06);display:grid;place-items:center;color:var(--accent);font-weight:800;font-size:13px}
.section-title h2{font-size:19px;line-height:1.2}.section-title span{display:block;color:var(--quiet);font-size:12px;margin-top:2px}
.panel{border-radius:var(--radius);padding:22px;margin-bottom:22px}

.upload-grid{display:grid;grid-template-columns:minmax(0,1fr) 312px;gap:22px;align-items:stretch}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.field{display:flex;flex-direction:column;gap:6px}.field.full{grid-column:1/-1}
.flabel{font-size:12px;font-weight:760;color:#4b5563}.req{color:var(--red)}
.field input,.field select,.field textarea,.toolbar input,.toolbar select{
  width:100%;
  min-height:42px;
  border:1px solid var(--line);
  border-radius:var(--radius-sm);
  background:rgba(255,255,255,.62);
  color:var(--text);
  padding:9px 12px;
  transition:border-color .18s,box-shadow .18s,background .18s;
}
.field textarea{min-height:86px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus,.toolbar input:focus,.toolbar select:focus{border-color:var(--accent-line);background:rgba(255,255,255,.9);box-shadow:0 0 0 4px rgba(79,70,229,.09)}
.tag-wrap{display:flex;flex-wrap:wrap;gap:6px;align-items:center;min-height:44px;padding:6px 9px;border:1px solid var(--line);border-radius:var(--radius-sm);background:rgba(255,255,255,.62);cursor:text}
.tag-wrap:focus-within{border-color:var(--accent-line);box-shadow:0 0 0 4px rgba(79,70,229,.09)}
.tag{display:inline-flex;align-items:center;gap:5px;min-height:24px;padding:0 8px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:720}
.tag-x{cursor:pointer;opacity:.7}.tag-x:hover{opacity:1}
.tag-in{border:none;outline:0;background:transparent;min-width:170px;flex:1;color:var(--text)}
.tag-hint{font-size:11px;color:var(--quiet);margin-top:5px}
.actions{display:flex;gap:10px;align-items:center;margin-top:4px;flex-wrap:wrap}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  min-height:38px;
  padding:0 14px;
  border-radius:var(--radius-sm);
  cursor:pointer;
  font-size:13px;
  font-weight:760;
  color:var(--text);
  background:rgba(255,255,255,.62);
  border:1px solid var(--line);
  transition:transform .18s,box-shadow .18s,border-color .18s,background .18s,color .18s;
  white-space:nowrap;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(17,24,39,.08);border-color:var(--line-strong);background:rgba(255,255,255,.86)}
.btn:active{transform:translateY(0) scale(.98)}
.btn:disabled{opacity:.52;cursor:not-allowed;transform:none;box-shadow:none}
.btn-primary{min-height:44px;padding:0 20px;color:#fff;background:linear-gradient(135deg,#4338ca,#2563eb);border-color:rgba(255,255,255,.28);box-shadow:0 14px 30px rgba(79,70,229,.22)}
.btn-danger{color:var(--red)}.btn-dl{color:#047857;background:rgba(5,150,105,.08);border-color:rgba(5,150,105,.18)}
.btn-xs{min-height:32px;padding:0 10px;font-size:12px}
.seg{display:flex;padding:3px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.42)}
.seg button{min-height:30px;padding:0 10px;border-radius:9px;background:transparent;color:var(--muted);font-size:12px;font-weight:760;cursor:pointer}
.seg button.active{background:#fff;color:var(--accent);box-shadow:0 4px 12px rgba(17,24,39,.06)}

.dropzone{
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-height:100%;
  padding:22px;
  border:1.5px dashed var(--line-strong);
  border-radius:var(--radius);
  background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(255,255,255,.28));
  cursor:pointer;
  transition:border-color .2s,box-shadow .2s,background .2s;
}
.dropzone:hover,.dropzone.active{border-color:var(--accent);box-shadow:0 18px 42px rgba(79,70,229,.14);background:rgba(255,255,255,.66)}
.drop-badge{width:58px;height:58px;border-radius:18px;display:grid;place-items:center;margin-bottom:14px;color:#fff;background:linear-gradient(135deg,#111827,#4f46e5);font-weight:820;font-size:18px;box-shadow:0 14px 30px rgba(17,24,39,.18)}
.dropzone strong{font-size:16px}.dropzone p{font-size:12px;color:var(--muted);margin-top:4px}.dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.file-list{position:relative;z-index:1;margin-top:12px;max-height:116px;overflow:auto;font-size:12px;color:var(--muted);word-break:break-all}
.file-count{display:inline-flex;margin-bottom:6px;padding:3px 8px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-weight:760}
.progress{display:none;margin-top:12px;height:5px;background:rgba(17,24,39,.08);border-radius:99px;overflow:hidden}.progress span{display:block;width:0;height:100%;background:linear-gradient(90deg,#4f46e5,#0891b2);transition:width .24s}

.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
.stat{display:flex;align-items:center;gap:12px;min-height:82px;padding:15px;border:1px solid var(--line);border-radius:15px;background:rgba(255,255,255,.48);cursor:pointer;transition:transform .18s,border-color .18s,background .18s,box-shadow .18s}
.stat:hover,.stat.sel{transform:translateY(-1px);border-color:var(--accent-line);background:rgba(255,255,255,.78);box-shadow:0 12px 24px rgba(17,24,39,.07)}
.stat-ico{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;font-size:12px;font-weight:820;color:#fff}
.stat-ico.all{background:#111827}.stat-ico.scene{background:var(--blue)}.stat-ico.character{background:var(--amber)}.stat-ico.prop{background:var(--green)}
.stat b{font-size:25px;line-height:1}.stat span{font-size:12px;color:var(--muted)}
.toolbar{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;margin-bottom:12px}
.toolbar-left{display:grid;grid-template-columns:142px minmax(180px,1fr) 132px 132px 152px;gap:8px;align-items:center}
.toolbar-right{display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
.asset-count{font-size:12px;color:var(--muted);margin:0 2px 14px}
.tag-rail{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.tag-filter{min-height:28px;padding:0 10px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.48);color:var(--muted);font-size:12px;font-weight:720;cursor:pointer}
.tag-filter.active,.tag-filter:hover{color:var(--accent);border-color:var(--accent-line);background:var(--accent-soft)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(286px,1fr));gap:14px}
.grid.list{grid-template-columns:1fr}
.card-asset{position:relative;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,255,255,.57);transition:transform .2s,border-color .2s,box-shadow .2s,background .2s;animation:fadeUp .28s ease both}
.card-asset:hover{transform:translateY(-2px);border-color:var(--accent-line);box-shadow:0 18px 36px rgba(17,24,39,.1);background:rgba(255,255,255,.78)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.thumb{position:relative;width:100%;aspect-ratio:16/9;background:#e8edf5;display:grid;place-items:center;overflow:hidden;cursor:pointer}
.thumb img{width:100%;height:100%;object-fit:cover;transition:transform .36s}.card-asset:hover .thumb img{transform:scale(1.04)}
.no-img{display:grid;place-items:center;width:72px;height:72px;border-radius:20px;background:rgba(17,24,39,.06);color:var(--quiet);font-size:12px;font-weight:800}
.select-box{position:absolute;top:10px;left:10px;width:24px;height:24px;border-radius:8px;border:2px solid rgba(255,255,255,.88);background:rgba(17,24,39,.28);color:#fff;display:none;place-items:center;z-index:2;font-size:12px;cursor:pointer;backdrop-filter:blur(8px)}
.batch-mode .select-box,.card-asset.selected .select-box{display:grid}.card-asset.selected .select-box{background:var(--accent)}
.asset-body{padding:15px 16px 13px;display:flex;flex-direction:column;gap:9px;flex:1}
.asset-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.type{display:inline-flex;align-items:center;min-height:24px;padding:0 8px;border-radius:999px;font-size:11px;font-weight:800}.type-scene{background:rgba(37,99,235,.1);color:#1d4ed8}.type-character{background:rgba(217,119,6,.12);color:#92400e}.type-prop{background:rgba(5,150,105,.1);color:#047857}
.time{font-size:11px;color:var(--quiet);white-space:nowrap}.asset-name{font-size:15px;font-weight:800;line-height:1.28;cursor:pointer;word-break:break-word}.asset-name:hover{color:var(--accent)}
.meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:12px}
.asset-tags{display:flex;gap:5px;flex-wrap:wrap}.asset-tag{display:inline-flex;align-items:center;min-height:22px;padding:0 7px;border-radius:999px;background:rgba(17,24,39,.05);color:#4b5563;font-size:11px;font-weight:720}
.file-pill,.note{border-radius:10px;background:rgba(17,24,39,.035);color:var(--muted);font-size:12px}.file-pill{padding:7px 9px;word-break:break-word}.note{padding:8px 10px;line-height:1.45}
.asset-actions{display:flex;gap:7px;padding:0 16px 15px;flex-wrap:wrap}
.grid.list .card-asset{display:grid;grid-template-columns:210px minmax(0,1fr);min-height:146px}.grid.list .thumb{height:100%;aspect-ratio:auto}.grid.list .asset-actions{align-content:end;padding-top:15px}
.empty{grid-column:1/-1;text-align:center;padding:58px 20px;border:1px dashed var(--line-strong);border-radius:var(--radius);background:rgba(255,255,255,.38)}
.empty-art{width:70px;height:70px;margin:0 auto 14px;border-radius:20px;background:rgba(17,24,39,.05);display:grid;place-items:center;color:var(--quiet);font-weight:820}.empty h3{font-size:17px}.empty p{margin-top:4px;font-size:13px;color:var(--quiet)}

.modal-overlay{position:fixed;inset:0;z-index:999;display:none;align-items:center;justify-content:center;padding:22px;background:rgba(15,23,42,.38);backdrop-filter:blur(8px);animation:fadeIn .18s}
@keyframes fadeIn{from{opacity:0}}
.modal{position:relative;width:min(900px,100%);max-height:88vh;overflow:auto;border:1px solid rgba(255,255,255,.56);border-radius:20px;background:rgba(255,255,255,.9);box-shadow:var(--shadow);animation:pop .2s}
@keyframes pop{from{opacity:0;transform:scale(.97)}}
.modal-close{position:absolute;top:13px;right:13px;width:34px;height:34px;border-radius:12px;background:rgba(17,24,39,.06);cursor:pointer;color:var(--muted);font-weight:800}
.modal-close:hover{background:rgba(17,24,39,.1);color:var(--text)}
.modal-img{width:100%;max-height:430px;object-fit:contain;background:#f2f5fa;display:block}.modal-body{padding:24px 28px}.modal-body h3{font-size:22px;line-height:1.25;margin-bottom:14px}
.modal-row{display:flex;gap:10px 16px;flex-wrap:wrap;margin-bottom:10px;font-size:13px;color:var(--muted)}.modal-row strong{color:var(--text)}
.modal-section{margin-top:18px;padding-top:18px;border-top:1px solid var(--line)}.modal-section h4{font-size:14px;margin-bottom:10px}
.usage-item{display:flex;justify-content:space-between;gap:16px;padding:8px 0;border-bottom:1px solid rgba(17,24,39,.06);font-size:12px;color:var(--muted)}
.relation-list{display:flex;gap:7px;flex-wrap:wrap}.relation-chip{padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:rgba(17,24,39,.035);color:var(--muted);font-size:12px;cursor:pointer}.relation-chip.active{background:var(--accent-soft);border-color:var(--accent-line);color:var(--accent);font-weight:760}

.toasts{position:fixed;top:18px;left:50%;z-index:1000;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{min-width:230px;padding:12px 16px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.92);backdrop-filter:var(--blur);box-shadow:var(--shadow-sm);font-size:13px;font-weight:760;animation:toastIn .22s}.toast.success{color:#047857}.toast.error{color:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px)}}
.footer{text-align:center;padding:28px 20px 42px;color:var(--quiet);font-size:12px}

@media(max-width:980px){
  .hero{grid-template-columns:1fr}.upload-grid{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr}.toolbar-left{grid-template-columns:1fr 1fr}.toolbar-right{justify-content:flex-start}.stats{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:640px){
  .tb{height:auto;min-height:68px;padding:10px 14px;align-items:flex-start}.tb-actions{gap:6px}.tb-title span{display:none}.shell{padding:18px 14px 38px}.hero-main{padding:26px 20px}.hero h1{font-size:30px}.form-grid,.toolbar-left{grid-template-columns:1fr}.stats{grid-template-columns:1fr}.grid.list .card-asset{grid-template-columns:1fr}.grid.list .thumb{aspect-ratio:16/9}.quick-metrics{grid-template-columns:1fr}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important;transition-duration:.01ms!important}
}

/* Production desk visual system */
:root{
  --bg:#e9e3d8;
  --panel:#f7f2e8;
  --panel-strong:#fffaf0;
  --line:rgba(57,45,31,.18);
  --line-strong:rgba(57,45,31,.36);
  --text:#1d1a16;
  --muted:#6b6258;
  --quiet:#978b7d;
  --accent:#a33b2f;
  --accent-soft:rgba(163,59,47,.1);
  --accent-line:rgba(163,59,47,.38);
  --cyan:#426d75;
  --green:#42664c;
  --amber:#9b682c;
  --blue:#415f79;
  --red:#a33b2f;
  --shadow-sm:0 12px 30px rgba(45,34,22,.07);
  --shadow:0 24px 70px rgba(35,27,19,.18);
  --radius:4px;
  --radius-sm:3px;
  --blur:none;
  --font:"Avenir Next","PingFang SC","Microsoft YaHei",sans-serif;
  --serif:"Songti SC","STSong","Noto Serif SC",serif;
}
body{
  background:
    linear-gradient(rgba(56,43,29,.026) 1px,transparent 1px),
    linear-gradient(90deg,rgba(56,43,29,.02) 1px,transparent 1px),
    var(--bg);
  background-size:24px 24px;
  background-attachment:fixed;
}
body::before{
  background:
    radial-gradient(circle at 8% 8%,rgba(163,59,47,.08),transparent 25%),
    radial-gradient(circle at 88% 22%,rgba(155,104,44,.08),transparent 28%);
  mask-image:none;
}
.tb{
  height:72px;
  padding:0 clamp(18px,4vw,56px);
  border-color:rgba(255,255,255,.09);
  color:#f5efe5;
  background:rgba(22,20,17,.94);
  backdrop-filter:blur(18px);
}
.tb-mark{
  width:40px;
  height:40px;

<body>
<header class="tb">
  <div class="tb-brand">
    <div class="tb-mark"><img src="assets/app-logo.svg" alt="AI视频资产管理 Logo"></div>
    <div class="tb-title"><strong>AI视频资产管理</strong><span>资产库 · 协作 · 云端同步</span></div>
  </div>
  <div class="tb-actions">
    <span class="status-pill" id="statusBadge">云端同步</span>
    <button class="btn btn-xs" onclick="exportCSV()">导出CSV</button>
    <button class="btn btn-xs" id="batchBtn" onclick="toggleBatchMode()" style="display:none">批量选择</button>
    <button class="btn btn-xs btn-dl" id="batchDlBtn" onclick="batchDownload()" style="display:none">打包下载</button>
  </div>
</header>

<main class="shell">
  <section class="hero">
    <div class="hero-main">
      <div class="kicker"><i></i> FILM PRODUCTION ASSET DESK</div>
      <h1>让每一张垫图，都回到<span>正确的镜头里</span></h1>
      <p>场景、人物与道具统一归档。用标签、关联和使用记录，把生成素材从散落文件变成可追踪的制片资产。</p>
    </div>
    <aside class="hero-side">
      <div class="logo-card">
        <img src="assets/app-logo.svg" alt="">
        <div><strong>Links 制片资产库</strong><span>云端同步 · 多人协作 · 生成素材归档</span></div>
      </div>
      <div class="quick-metrics">
        <div class="qm"><b id="heroTotal">0</b><span>总资产</span></div>
        <div class="qm"><b id="heroTags">0</b><span>活跃标签</span></div>
      </div>
    </aside>
  </section>

  <div class="section-head">
    <div class="section-title"><div class="section-icon">UP</div><div><h2>上传资产</h2><span>支持批量文件、统一负责人、统一标签</span></div></div>
  </div>
  <section class="panel">
    <div class="upload-grid">
      <div class="form-grid">
        <div class="field">
          <label class="flabel" for="assetType">资产类型 <span class="req">*</span></label>
          <select id="assetType"><option value="">请选择</option><option value="场景">场景</option><option value="人物">人物</option><option value="道具">道具</option></select>
        </div>
        <div class="field">
          <label class="flabel" for="assetOwner">负责人 <span class="req">*</span></label>
          <input type="text" id="assetOwner" placeholder="负责人姓名">
        </div>
        <div class="field full">
          <label class="flabel" for="tagInput">标签</label>
          <div class="tag-wrap" id="tagWrap" onclick="document.getElementById('tagInput').focus()">
            <input class="tag-in" id="tagInput" placeholder="输入标签后按回车，例如：室内、主角、近景" onkeydown="handleTagKey(event)">
          </div>
          <div class="tag-hint">支持回车添加，也可以用中文逗号或英文逗号连续输入。</div>
        </div>
        <div class="field full">
          <label class="flabel" for="assetNote">备注</label>
          <textarea id="assetNote" placeholder="补充描述、用途说明、镜头限制或生成来源。"></textarea>
        </div>
        <div class="field full">
          <div class="actions">
            <button class="btn btn-primary" id="submitBtn" onclick="addAsset()">提交资产</button>
            <button class="btn" onclick="resetForm()">重置</button>
          </div>
        </div>
      </div>
      <label class="dropzone" id="dz">
        <div class="drop-badge">ADD</div>
        <strong>点击或拖拽上传</strong>
        <p>图片、视频、3D 模型均可，多选后会批量创建资产。</p>
        <div class="file-list" id="dzFiles"></div>
        <div class="progress" id="dzP"><span id="dzBar"></span></div>
        <input type="file" id="assetFile" multiple accept="image/*,video/*,.fbx,.obj,.glb,.gltf,.blend,.abc,.usd,.usdz" onchange="onFilesPicked(event)">
      </label>
    </div>
  </section>

  <div class="section-head">
    <div class="section-title"><div class="section-icon">LIB</div><div><h2>资产列表</h2><span id="listHint">正在加载...</span></div></div>
    <div class="seg" aria-label="视图模式">
      <button id="gridViewBtn" class="active" onclick="setViewMode('grid')">网格</button>
      <button id="listViewBtn" onclick="setViewMode('list')">列表</button>
    </div>
  </div>
  <section class="panel">
    <div class="stats" id="stats"></div>
    <div class="toolbar">
      <div class="toolbar-left">
        <select id="filterType" onchange="renderAll()"><option value="">全部类型</option><option value="场景">场景</option><option value="人物">人物</option><option value="道具">道具</option></select>
        <input type="text" id="filterSearch" placeholder="搜索名称、负责人、标签、备注..." oninput="renderAll()">
        <input type="date" id="filterDateFrom" onchange="renderAll()" title="开始日期">
        <input type="date" id="filterDateTo" onchange="renderAll()" title="结束日期">
        <select id="sortMode" onchange="renderAll()"><option value="newest">最新优先</option><option value="oldest">最早优先</option><option value="name">名称 A-Z</option><option value="owner">负责人 A-Z</option><option value="size">文件较大优先</option></select>
      </div>
      <div class="toolbar-right">
        <button class="btn btn-xs" onclick="selectVisible()" id="selectVisibleBtn" style="display:none">全选当前</button>
        <button class="btn btn-xs" onclick="clearFilters()">清除筛选</button>
        <button class="btn btn-xs btn-danger" onclick="clearAll()">清空全部</button>
      </div>
    </div>
    <div class="asset-count" id="assetCount"></div>
    <div class="tag-rail" id="tagRail"></div>
    <div class="grid" id="assetGrid">
      <div class="empty"><div class="empty-art">LOAD</div><h3>加载中</h3><p>正在获取资产数据</p></div>
    </div>
  </section>
</main>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>
<div class="toasts" id="toastC"></div>
<footer class="footer">AI视频资产管理 · 云端存储 · 多人协作</footer>

<script>
const API='https://ai-video-assets.b6srv2yc22.workers.dev';
let allAssets=[],uploading=false,batchMode=false,selectedIds=new Set(),currentTags=[],activeTag='',viewMode=localStorage.getItem('assetViewMode')||'grid',visibleAssets=[];

const qs=id=>document.getElementById(id);
const esc=s=>{const d=document.createElement('div');d.textContent=s??'';return d.innerHTML};
const isImage=a=>a.file&&['png','jpg','jpeg','gif','webp','svg','bmp'].includes((a.file.ext||'').toLowerCase());
const tm=v=>v?new Date(v+(String(v).endsWith('Z')?'':'Z')).toLocaleString('zh-CN',{hour12:false}):'';
const shortDate=v=>v?new Date(v+(String(v).endsWith('Z')?'':'Z')).toLocaleDateString('zh-CN'):'';
const typeClass={'场景':'type-scene','人物':'type-character','道具':'type-prop'};
const typeCode={'场景':'SCENE','人物':'CHAR','道具':'PROP'};

function toast(message,type='success'){
  const e=document.createElement('div');
  e.className='toast '+type;
  e.textContent=(type==='success'?'完成：':'错误：')+message;
  qs('toastC').appendChild(e);
  setTimeout(()=>{e.style.opacity='0';e.style.transition='opacity .25s';setTimeout(()=>e.remove(),250)},2400);
}

function normalizeTagInput(raw){
  return raw.split(/[,，]/).map(x=>x.trim()).filter(Boolean);
}
function handleTagKey(e){
  if(e.key==='Enter'||e.key===','||e.key==='，'){
    e.preventDefault();
    normalizeTagInput(e.target.value).forEach(v=>{if(!currentTags.includes(v))currentTags.push(v)});
    e.target.value='';
    renderTags();
  }
}
function renderTags(){
  const wrap=qs('tagWrap'),input=qs('tagInput');
  wrap.querySelectorAll('.tag').forEach(t=>t.remove());
  currentTags.forEach((tag,i)=>{
    const el=document.createElement('span');
    el.className='tag';
    el.innerHTML=esc(tag)+' <span class="tag-x" onclick="removeTag('+i+')">×</span>';
    wrap.insertBefore(el,input);
  });
}
function removeTag(i){currentTags.splice(i,1);renderTags()}

function onFilesPicked(e){
  const files=Array.from(e.target.files||[]);
  const el=qs('dzFiles');
  if(!files.length){el.textContent='';return}
  const total=files.reduce((sum,f)=>sum+f.size,0);
  const size=total>=1048576?(total/1048576).toFixed(1)+' MB':Math.max(1,total/1024).toFixed(0)+' KB';
  el.innerHTML='<span class="file-count">'+files.length+' 个文件 · '+size+'</span><br>'+files.map(f=>esc(f.name)).join('<br>');
}

async function addAsset(){
  if(uploading)return;
  const type=qs('assetType').value;
  const owner=qs('assetOwner').value.trim();
  const note=qs('assetNote').value.trim();
  const files=Array.from(qs('assetFile').files||[]);
  normalizeTagInput(qs('tagInput').value).forEach(v=>{if(!currentTags.includes(v))currentTags.push(v)});
  qs('tagInput').value='';
  renderTags();
  if(!type)return toast('请选择资产类型','error');
  if(!owner)return toast('请填写负责人','error');
  if(!files.length)return toast('请选择文件','error');

  uploading=true;
  const btn=qs('submitBtn');
  btn.disabled=true;
  btn.textContent='上传中...';
  const tagStr=JSON.stringify(currentTags);
  let success=0,fail=0;
  try{
    const fd=new FormData();
    fd.append('type',type);
    fd.append('owner',owner);
    fd.append('note',note);
    fd.append('tags',tagStr);
    if(files.length===1){
      fd.append('name',files[0].name.replace(/\.[^.]+$/,'').replace(/[_-]/g,' '));
      fd.append('file',files[0]);
      await uploadForm(API+'/api/assets',fd,()=>{success=1});
    }else{
      files.forEach(f=>fd.append('files',f));
      await uploadForm(API+'/api/assets/batch',fd,d=>{success=d.success||0;fail=files.length-success});
    }
    resetForm();
    await loadAssets();
    toast(files.length>1?'上传完成：'+success+' 成功'+(fail?'，'+fail+' 失败':''):'资产上传成功');
  }catch(err){
    console.error(err);
    toast('上传失败：'+(err.message||'未知错误'),'error');
  }finally{
    uploading=false;
    btn.disabled=false;
    btn.textContent='提交资产';
    qs('dzP').style.display='none';
    qs('dzBar').style.width='0%';
  }
}

function uploadForm(url,fd,onDone){
  return new Promise((resolve,reject)=>{
    const xhr=new XMLHttpRequest();
    xhr.upload.addEventListener('progress',e=>{
      if(e.lengthComputable){
        qs('dzP').style.display='block';
        qs('dzBar').style.width=(e.loaded/e.total*100).toFixed(1)+'%';
      }
    });
    xhr.addEventListener('load',()=>{
      if(xhr.status>=200&&xhr.status<300){
        const data=xhr.responseText?JSON.parse(xhr.responseText):{};
        onDone(data);
        resolve(data);
      }else{
        try{reject(new Error(JSON.parse(xhr.responseText).error))}catch{reject(new Error('HTTP '+xhr.status))}
      }
    });
    xhr.addEventListener('error',()=>reject(new Error('网络错误')));
    xhr.open('POST',url);
    xhr.send(fd);
  });
}

function resetForm(){
  ['assetType','assetOwner','assetNote'].forEach(id=>qs(id).value='');
  qs('assetFile').value='';
  qs('dzFiles').textContent='';
  currentTags=[];
  renderTags();
}

async function loadAssets(){
  try{
    const r=await fetch(API+'/api/assets');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    allAssets=d.assets||[];
    qs('statusBadge').style.display='inline-flex';
    qs('listHint').textContent='云端同步';
  }catch(e){
    console.error(e);
    allAssets=[];
    qs('listHint').textContent='连接失败';
    toast('无法连接云端资产库','error');
  }
  qs('batchBtn').style.display=allAssets.length?'inline-flex':'none';
  renderAll();
}

function getFilteredAssets(){
  const ft=qs('filterType').value;
  const fs=qs('filterSearch').value.trim().toLowerCase();
  const df=qs('filterDateFrom').value;
  const dt=qs('filterDateTo').value;
  const sort=qs('sortMode').value;
  let list=[...allAssets];
  if(ft)list=list.filter(a=>a.type===ft);
  if(activeTag)list=list.filter(a=>(a.tags||[]).includes(activeTag));
  if(fs)list=list.filter(a=>{
    const hay=[a.name,a.owner,a.note,a.type,a.file?.name,(a.tags||[]).join(' '),(a.usageHistory||[]).map(u=>u.videoName).join(' ')].join(' ').toLowerCase();
    return hay.includes(fs);
  });
  if(df)list=list.filter(a=>String(a.createdAt||'')>=df);
  if(dt)list=list.filter(a=>String(a.createdAt||'')<=dt+'T23:59:59Z');
  list.sort((a,b)=>{
    if(sort==='oldest')return String(a.createdAt||'').localeCompare(String(b.createdAt||''));
    if(sort==='name')return String(a.name||'').localeCompare(String(b.name||''),'zh-CN');
    if(sort==='owner')return String(a.owner||'').localeCompare(String(b.owner||''),'zh-CN');
    if(sort==='size')return (b.file?.sizeBytes||0)-(a.file?.sizeBytes||0);
    return String(b.createdAt||'').localeCompare(String(a.createdAt||''));
  });
  return list;
}

function renderStats(){
  const counts={
    all:allAssets.length,
    scene:allAssets.filter(a=>a.type==='场景').length,
    character:allAssets.filter(a=>a.type==='人物').length,
    prop:allAssets.filter(a=>a.type==='道具').length
  };
  const ft=qs('filterType').value;
  qs('stats').innerHTML=[
    {k:'all',label:'总资产',value:'',n:counts.all},
    {k:'scene',label:'场景',value:'场景',n:counts.scene},
    {k:'character',label:'人物',value:'人物',n:counts.character},
    {k:'prop',label:'道具',value:'道具',n:counts.prop}
  ].map(x=>'<button class="stat '+(ft===x.value?'sel':'')+'" onclick="qs(\'filterType\').value=\''+x.value+'\';renderAll()"><span class="stat-ico '+x.k+'">'+x.k.toUpperCase().slice(0,4)+'</span><span><b>'+x.n+'</b><span>'+x.label+'</span></span></button>').join('');
  qs('heroTotal').textContent=allAssets.length;
  qs('heroTags').textContent=getTagCounts().length;
}

function getTagCounts(){
  const map=new Map();
  allAssets.forEach(a=>(a.tags||[]).forEach(t=>map.set(t,(map.get(t)||0)+1)));
  return [...map.entries()].sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0],'zh-CN'));
}
function renderTagRail(){
  const tags=getTagCounts().slice(0,18);
  qs('tagRail').innerHTML=tags.length?tags.map(([tag,count])=>'<button class="tag-filter '+(activeTag===tag?'active':'')+'" onclick="toggleTagFilter(\''+escapeJs(tag)+'\')">'+esc(tag)+' · '+count+'</button>').join(''):'';
}
function escapeJs(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function toggleTagFilter(tag){activeTag=activeTag===tag?'':tag;renderAll()}

function renderGrid(){
  visibleAssets=getFilteredAssets();
  const grid=qs('assetGrid');
  grid.className='grid '+(viewMode==='list'?'list':'');
  grid.classList.toggle('batch-mode',batchMode);
  qs('gridViewBtn').classList.toggle('active',viewMode==='grid');
  qs('listViewBtn').classList.toggle('active',viewMode==='list');
  qs('selectVisibleBtn').style.display=batchMode&&visibleAssets.length?'inline-flex':'none';
  updateBatchButtons();
  qs('assetCount').textContent='当前显示 '+visibleAssets.length+' 个 / 全部 '+allAssets.length+' 个'+(activeTag?' · 标签：'+activeTag:'')+(selectedIds.size?' · 已选 '+selectedIds.size+' 个':'');
  if(!visibleAssets.length){
    grid.innerHTML='<div class="empty"><div class="empty-art">EMPTY</div><h3>没有匹配的资产</h3><p>换个关键词、标签或日期范围。</p></div>';
    return;
  }
  grid.innerHTML=visibleAssets.map((a,i)=>assetCard(a,i)).join('');
}

function assetCard(a,i){
  const thumb=isImage(a)?'<img src="'+a.file.downloadURL+'" alt="'+esc(a.name)+'" loading="lazy" onerror="this.parentElement.innerHTML=\'<span class=&quot;no-img&quot;>IMG</span>\'">':'<span class="no-img">'+esc((a.file?.ext||'FILE').toUpperCase().slice(0,5))+'</span>';
  const tags=(a.tags||[]).map(t=>'<span class="asset-tag">'+esc(t)+'</span>').join('');
  return '<article class="card-asset '+(selectedIds.has(a.id)?'selected':'')+'" style="animation-delay:'+(Math.min(i,12)*26)+'ms">'+
    '<div class="thumb" onclick="openModal(\''+a.id+'\')">'+thumb+'<button class="select-box" onclick="event.stopPropagation();toggleSelect(\''+a.id+'\')">✓</button></div>'+
    '<div class="asset-body">'+
      '<div class="asset-top"><span class="type '+(typeClass[a.type]||'')+'">'+(typeCode[a.type]||esc(a.type))+'</span><span class="time">'+shortDate(a.createdAt)+'</span></div>'+
      '<h3 class="asset-name" onclick="openModal(\''+a.id+'\')">'+esc(a.name)+'</h3>'+
      '<div class="meta"><span>负责人：'+esc(a.owner)+'</span><span>使用：'+((a.usageHistory||[]).length)+' 次</span><span>关联：'+((a.relatedAssets||[]).length)+' 个</span></div>'+
      (tags?'<div class="asset-tags">'+tags+'</div>':'')+
      (a.file?'<div class="file-pill">'+esc(a.file.name)+' · '+esc(a.file.size)+'</div>':'')+
      (a.note?'<div class="note">'+esc(a.note)+'</div>':'')+
    '</div>'+
    '<div class="asset-actions">'+(a.file?'<button class="btn btn-dl btn-xs" onclick="downloadAsset(\''+a.id+'\')">下载</button>':'')+
      '<button class="btn btn-xs" onclick="addUsage(\''+a.id+'\')">使用记录</button>'+
      '<button class="btn btn-xs btn-danger" onclick="deleteAsset(\''+a.id+'\')">删除</button></div>'+
  '</article>';
}

function renderAll(){renderStats();renderTagRail();renderGrid()}
function setViewMode(mode){viewMode=mode;localStorage.setItem('assetViewMode',mode);renderGrid()}
function clearFilters(){
  ['filterType','filterSearch','filterDateFrom','filterDateTo'].forEach(id=>qs(id).value='');
  qs('sortMode').value='newest';
  activeTag='';
  renderAll();
}

function toggleBatchMode(){
  batchMode=!batchMode;
  selectedIds.clear();
  qs('batchBtn').textContent=batchMode?'取消选择':'批量选择';
  renderGrid();
}
function toggleSelect(id){selectedIds.has(id)?selectedIds.delete(id):selectedIds.add(id);renderGrid()}
function selectVisible(){visibleAssets.forEach(a=>selectedIds.add(a.id));renderGrid()}
function updateBatchButtons(){
  qs('batchDlBtn').style.display=batchMode?'inline-flex':'none';
  qs('batchDlBtn').textContent=selectedIds.size?'打包下载（'+selectedIds.size+'）':'打包下载';
}
async function batchDownload(){
  if(!selectedIds.size)return toast('请先选择资产','error');
  const zip=new JSZip();
  let count=0;
  toast('正在打包，请稍候');
  for(const id of selectedIds){
    const a=allAssets.find(x=>x.id===id);
    if(!a?.file?.downloadURL)continue;
    try{
      const r=await fetch(a.file.downloadURL);
      if(r.ok){zip.file(a.file.name,await r.blob());count++}
    }catch(e){console.warn(e)}
  }
  if(!count)return toast('没有可下载文件','error');
  const blob=await zip.generateAsync({type:'blob'});
  const url=URL.createObjectURL(blob);
  const el=document.createElement('a');
  el.href=url;
  el.download='AI视频资产_'+new Date().toISOString().slice(0,10)+'.zip';
  el.click();
  URL.revokeObjectURL(url);
  toast('已打包 '+count+' 个文件');
}

function downloadAsset(id){
  const a=allAssets.find(x=>x.id===id);
  if(a?.file?.downloadURL)window.open(a.file.downloadURL,'_blank','noopener');
}
async function deleteAsset(id){
  const a=allAssets.find(x=>x.id===id);
  if(!confirm('确定删除「'+(a?.name||'该资产')+'」？此操作不可恢复。'))return;
  try{
    const r=await fetch(API+'/api/assets/'+id,{method:'DELETE'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    allAssets=allAssets.filter(x=>x.id!==id);
    selectedIds.delete(id);
    renderAll();
    toast('已删除');
  }catch(e){console.error(e);toast('删除失败','error')}
}
async function clearAll(){
  if(!allAssets.length)return toast('当前没有资产','error');
  if(!confirm('确定清空全部 '+allAssets.length+' 个资产？此操作不可恢复。'))return;
  try{
    for(const a of allAssets){
      try{await fetch(API+'/api/assets/'+a.id,{method:'DELETE'})}catch(e){console.warn(e)}
    }
    allAssets=[];
    selectedIds.clear();
    renderAll();
    toast('全部已清空');
  }catch(e){console.error(e);toast('清空失败','error')}
}

async function addUsage(id){
  const name=prompt('请输入使用的视频名称：');
  if(!name)return;
  try{
    const r=await fetch(API+'/api/assets/'+id+'/usage',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({videoName:name.trim()})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    await loadAssets();
    toast('使用记录已添加');
  }catch(e){console.error(e);toast('添加失败','error')}
}
async function updateRelations(id,relatedAssets){
  try{
    const r=await fetch(API+'/api/assets/'+id+'/relations',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({relatedAssets})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    await loadAssets();
    toast('关联已更新');
  }catch(e){console.error(e);toast('更新失败','error')}
}

function openModal(id){
  const a=allAssets.find(x=>x.id===id);
  if(!a)return;
  qs('modalContent').innerHTML='<button class="modal-close" onclick="closeModal()">×</button>'+
    (isImage(a)?'<img class="modal-img" src="'+a.file.downloadURL+'" alt="'+esc(a.name)+'">':'')+
    '<div class="modal-body"><h3>'+esc(a.name)+'</h3>'+
    '<div class="modal-row"><strong>类型</strong>'+esc(a.type)+'<strong>负责人</strong>'+esc(a.owner)+'<strong>时间</strong>'+tm(a.createdAt)+'</div>'+
    (a.file?'<div class="modal-row"><strong>文件</strong>'+esc(a.file.name)+' · '+esc(a.file.size)+' <button class="btn btn-dl btn-xs" onclick="downloadAsset(\''+a.id+'\')">下载</button></div>':'')+
    (a.note?'<div class="modal-row"><strong>备注</strong>'+esc(a.note)+'</div>':'')+
    ((a.tags||[]).length?'<div class="modal-row"><strong>标签</strong>'+(a.tags||[]).map(t=>'<span class="asset-tag">'+esc(t)+'</span>').join(' ')+'</div>':'')+
    '<div class="modal-section"><h4>使用记录</h4>'+((a.usageHistory||[]).length?(a.usageHistory||[]).map(u=>'<div class="usage-item"><span>'+esc(u.videoName)+'</span><span>'+shortDate(u.date)+'</span></div>').join(''):'<div class="modal-row">暂无使用记录</div>')+'</div>'+
    '<div class="modal-section"><h4>关联资产</h4><div class="relation-list">'+allAssets.filter(x=>x.id!==id).map(x=>{const rel=(a.relatedAssets||[]).includes(x.id);return '<button class="relation-chip '+(rel?'active':'')+'" onclick="toggleRelation(\''+id+'\',\''+x.id+'\')">'+esc(x.name)+'</button>'}).join('')+'</div></div></div>';
  qs('modal').style.display='flex';
}
function closeModal(){qs('modal').style.display='none'}
async function toggleRelation(id,relatedId){
  const a=allAssets.find(x=>x.id===id);
  if(!a)return;
  const rel=[...(a.relatedAssets||[])];
  const idx=rel.indexOf(relatedId);
  idx>=0?rel.splice(idx,1):rel.push(relatedId);
  await updateRelations(id,rel);
  openModal(id);
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

function csvCell(value){return '"'+String(value??'').replace(/"/g,'""')+'"'}
function exportCSV(){
  if(!allAssets.length)return toast('无数据可导出','error');
  const header=['类型','名称','负责人','标签','文件','大小','备注','时间','使用次数','关联数量'];
  const rows=allAssets.map(a=>[a.type,a.name,a.owner,(a.tags||[]).join(';'),a.file?.name||'',a.file?.size||'',a.note||'',tm(a.createdAt),(a.usageHistory||[]).length,(a.relatedAssets||[]).length].map(csvCell).join(','));
  const blob=new Blob(['\ufeff'+header.map(csvCell).join(',')+'\n'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const el=document.createElement('a');
  el.href=url;
  el.download='AI视频资产_'+new Date().toISOString().slice(0,10)+'.csv';
  el.click();
  URL.revokeObjectURL(url);
  toast('CSV 已导出');
}

const dz=qs('dz');
['dragover','dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>e.preventDefault()));
dz.addEventListener('dragover',()=>dz.classList.add('active'));
dz.addEventListener('dragleave',()=>dz.classList.remove('active'));
dz.addEventListener('drop',e=>{
  dz.classList.remove('active');
  if(e.dataTransfer.files.length){
    qs('assetFile').files=e.dataTransfer.files;
    onFilesPicked({target:{files:e.dataTransfer.files}});
  }
});

loadAssets();
</script>
